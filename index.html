<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="./images/clock.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/all.css">
  <link rel="stylesheet" href="./css/bootstrap.min.css">
  <link rel="stylesheet" href="./css/style.css">
  <title>Stop Watch</title>
</head>

<body>

    <section>
      <div class="container">
        <div class="clock-card">
          <img src="./images/clock.png" alt="Clock Icon" srcset="">
          
          <header>
            <h1>AE's Stop Watch</h1>
            <p class="subtitle">Precision Timing</p>
          </header>

          <div class="display">
            <div class="time-container">
              <div class="time-unit">
                <span class="hr">00</span>
                <span class="label">Hours</span>
              </div>
              <span class="separator">:</span>
              <div class="time-unit">
                <span class="min">00</span>
                <span class="label">Minutes</span>
              </div>
              <span class="separator">:</span>
              <div class="time-unit">
                <span class="sec">00</span>
                <span class="label">Seconds</span>
              </div>
            </div>
          </div>
          
          <div class="button-group">
            <button class="start btn" title="Start Timer">
              <i class="fas fa-play"></i>
              <span>Start</span>
            </button>
            <button class="stop btn" title="Stop Timer">
              <i class="fas fa-pause"></i>
              <span>Stop</span>
            </button>
            <button class="reset btn" type="reset" title="Reset Timer">
              <i class="fas fa-redo"></i>
              <span>Reset</span>
            </button>
          </div>
        </div>
      </div>
    </section>

  <script src="./js/jquery-3.6.0.min.js"></script>
  <script src="./js/fontawesome.js"></script>
  <script src="./js/popper.min.js"></script>
  <script src="./js/bootstrap.min.js"></script>
  <script src="./js/main.js"></script>
</body>

</html>
